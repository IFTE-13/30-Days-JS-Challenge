<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; min-height: 100vh; }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="bg-white/5 border border-white/10 rounded-2xl p-4 w-72">
    <input id="display" type="text" readonly
      class="w-full bg-transparent text-white text-right text-4xl font-bold tracking-wider mb-4 p-2 outline-none"
      placeholder="0">

    <div class="grid grid-cols-4 gap-2">

      <button onclick="clearDisplay()"     class="btn col-span-2 bg-white/10">AC</button>
      <button onclick="deleteLast()"       class="btn bg-white/10">DE</button>
      <button onclick="append('/')"        class="btn op">/</button>

      <button onclick="append('7')"        class="btn">7</button>
      <button onclick="append('8')"        class="btn">8</button>
      <button onclick="append('9')"        class="btn">9</button>
      <button onclick="append('*')"        class="btn op">*</button>

      <button onclick="append('4')"        class="btn">4</button>
      <button onclick="append('5')"        class="btn">5</button>
      <button onclick="append('6')"        class="btn">6</button>
      <button onclick="append('-')"        class="btn op">-</button>

      <button onclick="append('1')"        class="btn">1</button>
      <button onclick="append('2')"        class="btn">2</button>
      <button onclick="append('3')"        class="btn">3</button>
      <button onclick="append('+')"        class="btn op">+</button>

      <button onclick="append('00')"       class="btn">00</button>
      <button onclick="append('0')"        class="btn">0</button>
      <button onclick="append('.')"        class="btn">.</button>
      <button onclick="calculate()"        class="btn bg-white text-black">=</button>

    </div>
  </div>

  <style>
    .btn {
      padding: 16px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 500;
      color: white;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.15); }
    .btn:active { background: rgba(255,255,255,0.25); }
    .op { color: #aaa; }
  </style>

  <script>
    const display = document.getElementById('display');

    function append(val) {
      display.value += val;
    }

    function clearDisplay() {
      display.value = '';
    }

    function deleteLast() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = 'Error';
      }
    }
  </script>

</body>
</html>
