<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Notification</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        
        .toast-slide-in {
            animation: slideIn 0.3s ease forwards;
        }
        
        .toast-slide-out {
            animation: slideOut 0.3s ease forwards;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-gray-700">
        <div class="text-center mb-6">
            <div class="flex items-center justify-center gap-2 mb-2">
                <span class="material-icons text-3xl text-gray-400">notifications</span>
                <h1 class="text-2xl font-semibold text-gray-100">Toast Notifications</h1>
            </div>
            <div class="w-16 h-0.5 bg-gray-600 mx-auto"></div>
            <p class="text-gray-400 text-sm mt-3">Click any button to see a toast message</p>
        </div>
        
        <div class="flex flex-col gap-3">
            <button onclick="showToast('success')" class="bg-emerald-700 hover:bg-emerald-600 text-white py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all font-medium shadow-md">
                <span class="material-icons text-[18px]">check_circle</span>
                Success
            </button>
            
            <button onclick="showToast('warning')" class="bg-yellow-700 hover:bg-yellow-600 text-white py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all font-medium shadow-md">
                <span class="material-icons text-[18px]">warning</span>
                Warning
            </button>
            
            <button onclick="showToast('error')" class="bg-red-700 hover:bg-red-600 text-white py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all font-medium shadow-md">
                <span class="material-icons text-[18px]">error</span>
                Error
            </button>
            
            <button onclick="showToast('info')" class="bg-blue-700 hover:bg-blue-600 text-white py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all font-medium shadow-md">
                <span class="material-icons text-[18px]">info</span>
                Info
            </button>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-4 right-4 space-y-3 z-50"></div>

    <script>
        function showToast(type) {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let bgColor, icon, title, message;
            
            switch(type) {
                case 'success':
                    bgColor = 'bg-emerald-600';
                    icon = 'check_circle';
                    title = 'Success';
                    message = 'Operation completed successfully!';
                    break;
                case 'warning':
                    bgColor = 'bg-yellow-600';
                    icon = 'warning';
                    title = 'Warning';
                    message = 'Please check your input carefully.';
                    break;
                case 'error':
                    bgColor = 'bg-red-600';
                    icon = 'error';
                    title = 'Error';
                    message = 'Something went wrong. Please try again.';
                    break;
                case 'info':
                    bgColor = 'bg-blue-600';
                    icon = 'info';
                    title = 'Info';
                    message = 'Here is some information for you.';
                    break;
                default:
                    bgColor = 'bg-gray-600';
                    icon = 'notifications';
                    title = 'Notification';
                    message = 'You have a new notification.';
            }
            
            toast.className = `${bgColor} text-white rounded-lg shadow-lg p-4 min-w-[300px] max-w-md transform transition-all toast-slide-in`;
            toast.innerHTML = `
                <div class="flex items-start gap-3">
                    <span class="material-icons text-[22px] flex-shrink-0">${icon}</span>
                    <div class="flex-1">
                        <h4 class="font-semibold text-sm mb-1">${title}</h4>
                        <p class="text-xs opacity-90">${message}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="flex-shrink-0 opacity-70 hover:opacity-100 transition-opacity">
                        <span class="material-icons text-[16px]">close</span>
                    </button>
                </div>
                <div class="progress-bar mt-2 h-0.5 bg-white/30 rounded-full overflow-hidden">
                    <div class="h-full bg-white rounded-full" style="width: 100%; animation: shrink 3s linear forwards;"></div>
                </div>
            `;
            
            toastContainer.appendChild(toast);
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes shrink {
                    from { width: 100%; }
                    to { width: 0%; }
                }
            `;
            document.head.appendChild(style);
            
            setTimeout(() => {
                toast.classList.remove('toast-slide-in');
                toast.classList.add('toast-slide-out');
                setTimeout(() => {
                    if (toast.parentElement) {
                        toast.remove();
                    }
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
