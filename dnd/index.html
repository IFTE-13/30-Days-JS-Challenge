<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag and Drop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; min-height: 100vh; }
    .item { cursor: grab; transition: opacity 0.2s; }
    .item:active { cursor: grabbing; opacity: 0.5; }
    .box.dragover { border-color: rgba(255,255,255,0.4); }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="flex gap-4 w-full max-w-xl">

    <div class="flex-1 flex flex-col gap-3">
      <p class="text-gray-400 text-xs uppercase tracking-widest">Box A</p>
      <div id="boxA" class="box bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col gap-2 min-h-64 transition-all"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, 'boxA')">
        <div class="item bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white text-sm" draggable="true" ondragstart="onDragStart(event)">🎧 Headphones</div>
        <div class="item bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white text-sm" draggable="true" ondragstart="onDragStart(event)">📱 Phone</div>
        <div class="item bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white text-sm" draggable="true" ondragstart="onDragStart(event)">💻 Laptop</div>
        <div class="item bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white text-sm" draggable="true" ondragstart="onDragStart(event)">🖱️ Mouse</div>
      </div>
    </div>

    <div class="flex-1 flex flex-col gap-3">
      <p class="text-gray-400 text-xs uppercase tracking-widest">Box B</p>
      <div id="boxB" class="box bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col gap-2 min-h-64 transition-all"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, 'boxB')">
        <div class="item bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white text-sm" draggable="true" ondragstart="onDragStart(event)">⌨️ Keyboard</div>
        <div class="item bg-white/10 border border-white/10 rounded-xl px-4 py-3 text-white text-sm" draggable="true" ondragstart="onDragStart(event)">🖥️ Monitor</div>
      </div>
    </div>

  </div>

  <script>
    let dragged = null;

    function onDragStart(e) {
      dragged = e.target;
      setTimeout(() => dragged.style.opacity = '0.4', 0);
    }

    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('dragover');
    }

    function onDragLeave(e) {
      e.currentTarget.classList.remove('dragover');
    }

    function onDrop(e, boxId) {
      e.preventDefault();
      e.currentTarget.classList.remove('dragover');
      if (dragged) {
        dragged.style.opacity = '1';
        e.currentTarget.appendChild(dragged);
        dragged = null;
      }
    }

    document.addEventListener('dragend', () => {
      if (dragged) dragged.style.opacity = '1';
    });
  </script>

</body>
</html>
