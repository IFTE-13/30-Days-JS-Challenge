<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: #111; min-height: 100vh; }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="flex items-center bg-white/5 border border-white/10 rounded-xl px-4 py-3 gap-3 w-72">
    <input id="password" type="password" placeholder="Password"
      class="bg-transparent text-white placeholder-gray-500 outline-none flex-1 text-sm">
    <button onclick="togglePassword()" class="text-gray-400 hover:text-white transition-all">
      <i id="eyeIcon" class="fas fa-eye"></i>
    </button>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
  </script>

</body>
</html>
