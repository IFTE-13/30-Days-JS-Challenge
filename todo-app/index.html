<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <title>Taskly</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-start justify-center pt-16 px-4">

    <div class="w-full max-w-md bg-white rounded-2xl border border-gray-200 p-6">

        <div class="flex items-center gap-3 mb-6">
            <div class="bg-blue-500 text-white rounded-xl p-2">
                <i data-lucide="check-square" width="20" height="20"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800 leading-tight">Taskly</h1>
                <p id="taskCount" class="text-xs text-gray-400">0 tasks</p>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <input
                id="taskInput"
                type="text"
                placeholder="What needs to be done?"
                class="border border-gray-200 bg-gray-50 rounded-xl px-4 py-2.5 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all"
                onkeydown="if(event.key==='Enter') addTask()"
            />
            <button
                onclick="addTask()"
                class="bg-blue-500 hover:bg-blue-600 active:scale-95 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-all whitespace-nowrap"
            >
                Add
            </button>
        </div>

        <ul id="taskContainer" class="space-y-2"></ul>

        <div id="emptyState" class="flex flex-col items-center justify-center py-10 text-gray-300">
            <i data-lucide="clipboard-list" width="40" height="40"></i>
            <p class="text-sm mt-3">No tasks yet. Add one above!</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
