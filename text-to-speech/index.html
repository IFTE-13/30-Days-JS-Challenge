<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Speech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background: #111; min-height: 100vh; }
    select option { background: #1a1a1a; color: white; }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="bg-white/5 border border-white/10 rounded-2xl p-8 w-full max-w-sm flex flex-col gap-4">
    <h1 class="text-white text-xl font-bold">Text to Speech</h1>

    <textarea id="textInput" rows="4" placeholder="Write anything here..."
      class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-500 outline-none focus:border-white/40 transition-all resize-none"></textarea>

    <select id="voiceSelect"
      class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-white/40 transition-all cursor-pointer">
    </select>

    <button onclick="speak()" id="listenBtn"
      class="bg-white text-black font-medium py-3 rounded-xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
      <i class="fas fa-play text-sm"></i>
      <span id="btnText">Listen</span>
    </button>

    <button onclick="stopSpeech()" id="stopBtn"
      class="hidden border border-white/10 text-white text-sm py-3 rounded-xl hover:bg-white/10 transition-all flex items-center justify-center gap-2">
      <i class="fas fa-stop text-sm"></i> Stop
    </button>
  </div>

  <script src="script.js"></script>

</body>
</html>
