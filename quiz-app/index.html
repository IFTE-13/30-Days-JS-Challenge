<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzy</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-start justify-center pt-12 px-4">

  <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl p-7">
    <h1 class="text-2xl font-semibold text-center mb-6">Quizzy</h1>

    <!-- Quiz screen -->
    <div id="quiz-screen">
      <div class="flex justify-between text-sm text-gray-500 mb-2">
        <span id="progress-label">Question 1 of 5</span>
        <span id="score-label">Score: 0</span>
      </div>

      <div class="w-full h-1 bg-gray-200 rounded-full mb-6">
        <div id="progress-bar" class="h-1 bg-black rounded-full" style="width: 20%;"></div>
      </div>

      <p id="question-text" class="text-base font-medium leading-relaxed mb-5"></p>

      <div id="options-container" class="flex flex-col gap-2.5"></div>

      <p id="feedback" class="text-sm mt-4 min-h-5"></p>

      <button id="next-btn" onclick="nextQuestion()"
        class="hidden mt-5 w-full py-2.5 text-sm font-medium bg-black text-white rounded-lg hover:bg-gray-800">
        Next question
      </button>
    </div>

    <!-- Result screen -->
    <div id="result-screen" class="hidden text-center">
      <p class="text-sm text-gray-500 mb-1">Your score</p>
      <p id="final-score" class="text-5xl font-semibold mb-2"></p>
      <p id="result-msg" class="text-sm text-gray-500 mb-6"></p>
      <button onclick="restartQuiz()"
        class="w-full py-2.5 text-sm font-medium bg-black text-white rounded-lg hover:bg-gray-800">
        Try again
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
