<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>QR Code Generator</title>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-gray-700">
        <div class="text-center mb-6">
            <div class="flex items-center justify-center gap-2 mb-2">
                <span class="material-icons text-3xl text-gray-400">qr_code_scanner</span>
                <h1 class="text-2xl font-semibold text-gray-100">QR Code Generator</h1>
            </div>
            <div class="w-16 h-0.5 bg-gray-600 mx-auto"></div>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-gray-300 text-sm mb-2 block">Enter text or URL</label>
                <input type="text" id="qrInput" placeholder="https://example.com or any text" class="w-full bg-gray-900 text-gray-200 placeholder:text-gray-500 border border-gray-700 rounded-lg py-2.5 px-4 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent transition-all">
            </div>
            
            <button onclick="generateQRCode()" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-100 py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all font-medium shadow-md border border-gray-600">
                <span class="material-icons text-[18px]">qr_code</span>
                Generate QR Code
            </button>
        </div>
        
        <div id="qrResult" class="mt-6 hidden">
            <div class="border-t border-gray-700 pt-4">
                <div class="bg-gray-900 rounded-lg p-4 flex flex-col items-center border border-gray-700">
                    <div id="qrImageContainer" class="mb-3"></div>
                    <div class="flex gap-2">
                        <button onclick="downloadQR()" class="bg-gray-700 hover:bg-gray-600 text-gray-100 px-4 py-1.5 rounded-lg flex items-center gap-1 transition-all text-sm">
                            <span class="material-icons text-[16px]">download</span>
                            Download
                        </button>
                        <button onclick="clearQR()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-1.5 rounded-lg flex items-center gap-1 transition-all text-sm border border-gray-700">
                            <span class="material-icons text-[16px]">delete</span>
                            Clear
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
