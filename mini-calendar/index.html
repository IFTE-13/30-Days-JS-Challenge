<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; min-height: 100vh; }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden w-64">

    <div class="bg-white text-black flex flex-col items-center py-6 gap-1">
      <p id="date" class="text-7xl font-bold leading-none"></p>
      <p id="day"  class="text-sm font-medium tracking-widest uppercase"></p>
    </div>

    <div class="flex flex-col items-center py-6 gap-1">
      <p id="month" class="text-white text-2xl font-semibold"></p>
      <p id="year"  class="text-gray-400 text-sm"></p>
    </div>

  </div>

  <script>
    const weekDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months   = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    const today = new Date();

    document.getElementById('date').textContent  = String(today.getDate()).padStart(2, '0');
    document.getElementById('day').textContent   = weekDays[today.getDay()];
    document.getElementById('month').textContent = months[today.getMonth()];
    document.getElementById('year').textContent  = today.getFullYear();
  </script>

</body>
</html>
