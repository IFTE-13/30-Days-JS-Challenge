<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmos</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body class="bg-[#0a0a0f] min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white/5 border border-white/10 rounded-3xl p-6 text-[#e8e8f0]">

    <div>
      <div class="flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl px-4 py-2 focus-within:border-sky-400/50 transition">
        <input id="search-input" type="text" placeholder="Search city…" spellcheck="false" autocomplete="off"
               class="flex-1 bg-transparent outline-none text-sm placeholder-white/30" />
        <button id="search-btn"
                class="bg-gradient-to-br from-sky-400 to-cyan-400 rounded-lg w-8 h-8 flex items-center justify-center shrink-0 cursor-pointer hover:opacity-80 active:scale-95 transition">
          <i data-lucide="search" class="w-4 h-4 text-white"></i>
        </button>
      </div>
      <div id="error-msg" class="hidden mt-2 bg-red-500/10 border border-red-500/25 rounded-lg px-3 py-2 text-xs text-red-400">
        ⚠️ <span id="error-text"></span>
      </div>
    </div>

    <div class="text-center my-6">
      <img id="weather-icon" src="" alt="Weather icon" class="w-20 h-20 mx-auto" />
      <p id="temp-display" class="text-7xl font-bold tracking-tighter leading-none">—</p>
      <p id="city-name" class="mt-2 text-xs uppercase tracking-widest text-white/50">Loading…</p>
      <p id="condition-label" class="mt-1 text-sm text-white/40"></p>
    </div>

    <div class="grid grid-cols-2 gap-2">

      <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl p-3">
        <div class="w-9 h-9 rounded-lg bg-sky-400/15 flex items-center justify-center shrink-0">
          <i data-lucide="droplets" class="w-4 h-4 text-sky-400"></i>
        </div>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-white/35">Humidity</p>
          <p id="humidity" class="text-base font-semibold">—</p>
        </div>
      </div>

      <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl p-3">
        <div class="w-9 h-9 rounded-lg bg-cyan-400/15 flex items-center justify-center shrink-0">
          <i data-lucide="wind" class="w-4 h-4 text-cyan-400"></i>
        </div>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-white/35">Wind</p>
          <p id="wind-speed" class="text-base font-semibold">—</p>
        </div>
      </div>

      <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl p-3">
        <div class="w-9 h-9 rounded-lg bg-sky-400/15 flex items-center justify-center shrink-0">
          <i data-lucide="thermometer" class="w-4 h-4 text-sky-400"></i>
        </div>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-white/35">Feels Like</p>
          <p id="feels-like" class="text-base font-semibold">—</p>
        </div>
      </div>

      <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl p-3">
        <div class="w-9 h-9 rounded-lg bg-cyan-400/15 flex items-center justify-center shrink-0">
          <i data-lucide="eye" class="w-4 h-4 text-cyan-400"></i>
        </div>
        <div>
          <p class="text-[10px] uppercase tracking-widest text-white/35">Visibility</p>
          <p id="visibility" class="text-base font-semibold">—</p>
        </div>
      </div>

    </div>

    <p class="text-center text-[10px] text-white/20 mt-4">
      Powered by <a href="https://openweathermap.org" target="_blank" class="underline hover:text-white/40 transition">OpenWeatherMap</a>
    </p>

  </div>

<script>
  lucide.createIcons();

  const API_KEY = "0e63cafa1bbf1f53d9cdce64369f5798";
  const API_URL = `https://api.openweathermap.org/data/2.5/weather?units=metric&appid=${API_KEY}&q=`;
  const owmIcon = (code) => `https://openweathermap.org/img/wn/${code}@2x.png`;

  const searchInput  = document.getElementById("search-input");
  const searchBtn    = document.getElementById("search-btn");
  const errorMsg     = document.getElementById("error-msg");
  const errorText    = document.getElementById("error-text");
  const weatherIcon  = document.getElementById("weather-icon");
  const tempDisplay  = document.getElementById("temp-display");
  const cityName     = document.getElementById("city-name");
  const condLabel    = document.getElementById("condition-label");
  const humidityEl   = document.getElementById("humidity");
  const windEl       = document.getElementById("wind-speed");
  const feelsEl      = document.getElementById("feels-like");
  const visibilityEl = document.getElementById("visibility");

  async function fetchWeather(city) {
    hideError();
    try {
      const res = await fetch(API_URL + encodeURIComponent(city.trim()));
      if (res.status === 404) { showError(`"${city}" not found. Check the spelling and try again.`); return; }
      if (res.status === 401) { showError("Invalid API key."); return; }
      if (!res.ok)            { showError(`Request failed (${res.status}). Try again shortly.`); return; }
      renderWeather(await res.json());
    } catch {
      showError("Network error. Check your connection and try again.");
    }
  }

  function renderWeather(data) {
    weatherIcon.src          = owmIcon(data.weather[0].icon);
    tempDisplay.textContent  = `${Math.round(data.main.temp)}°`;
    cityName.textContent     = `${data.name}, ${data.sys.country}`;
    condLabel.textContent    = data.weather[0].description.replace(/^\w/, c => c.toUpperCase());
    humidityEl.textContent   = `${data.main.humidity}%`;
    windEl.textContent       = `${data.wind.speed} m/s`;
    feelsEl.textContent      = `${Math.round(data.main.feels_like)}°C`;
    visibilityEl.textContent = `${(data.visibility / 1000).toFixed(1)} km`;
  }

  function showError(msg) { errorText.textContent = msg; errorMsg.classList.remove("hidden"); }
  function hideError()    { errorMsg.classList.add("hidden"); }

  searchBtn.addEventListener("click", () => {
    const city = searchInput.value.trim();
    if (city) fetchWeather(city);
    else showError("Please enter a city name.");
  });

  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") searchBtn.click();
  });

  fetchWeather("Dhaka");
</script>
</body>
</html>
