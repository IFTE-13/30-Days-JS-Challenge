<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; min-height: 100vh; }
    .img-card { transition: transform 0.2s; }
    .img-card:hover { transform: scale(1.02); }
  </style>
</head>
<body class="p-6 flex flex-col gap-8">

  <div class="flex flex-col items-center gap-4 pt-6">
    <h1 class="text-white text-3xl font-bold">Image Search</h1>
    <div class="flex gap-2 w-full max-w-lg">
      <input id="searchInput" type="text" placeholder="Search anything..."
        class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-500 outline-none focus:border-white/40 transition-all"
        onkeydown="if(event.key==='Enter') newSearch()">
      <button onclick="newSearch()"
        class="bg-white text-black font-medium px-6 py-3 rounded-xl hover:bg-gray-200 transition-all text-sm">
        Search
      </button>
    </div>
  </div>

  <div id="grid" class="columns-2 md:columns-3 lg:columns-4 gap-3 max-w-6xl mx-auto w-full"></div>

  <!-- States -->
  <div id="emptyMsg" class="text-gray-500 text-sm text-center hidden">No results found.</div>
  <div id="loader"   class="text-gray-500 text-sm text-center hidden">Loading...</div>
  <div id="endMsg"   class="text-gray-500 text-sm text-center hidden pb-6">No more results.</div>

  <script>
    const ACCESS_KEY = 'YOUR_UNSPLASH_ACCESS_KEY';

    let query   = '';
    let page    = 1;
    let loading = false;
    let done    = false;

    async function fetchImages() {
      if (loading || done || !query) return;
      loading = true;
      document.getElementById('loader').classList.remove('hidden');

      try {
        const res  = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&page=${page}&per_page=20&client_id=${ACCESS_KEY}`);
        const data = await res.json();

        if (data.results.length === 0 && page === 1) {
          document.getElementById('emptyMsg').classList.remove('hidden');
        }

        if (page >= data.total_pages) {
          done = true;
          document.getElementById('endMsg').classList.remove('hidden');
        }

        data.results.forEach(img => {
          const div = document.createElement('div');
          div.className = 'img-card mb-3 break-inside-avoid rounded-xl overflow-hidden border border-white/10 cursor-pointer';
          div.innerHTML = `
            <img src="${img.urls.small}" alt="${img.alt_description || query}"
              class="w-full object-cover"
              onclick="window.open('${img.links.html}', '_blank')">
          `;
          document.getElementById('grid').appendChild(div);
        });

        page++;
      } catch (e) {
        console.error(e);
      } finally {
        loading = false;
        document.getElementById('loader').classList.add('hidden');
      }
    }

    function newSearch() {
      const val = document.getElementById('searchInput').value.trim();
      if (!val) return;
      query = val;
      page  = 1;
      done  = false;
      document.getElementById('grid').innerHTML     = '';
      document.getElementById('emptyMsg').classList.add('hidden');
      document.getElementById('endMsg').classList.add('hidden');
      fetchImages();
    }

    window.addEventListener('scroll', () => {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
        fetchImages();
      }
    });
  </script>

</body>
</html>
