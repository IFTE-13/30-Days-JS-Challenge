<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; min-height: 100vh; }
    .thumb { transition: border 0.2s; }
    .thumb.active { border: 2px solid white; }
    .color-dot { transition: transform 0.2s; }
    .color-dot.active { transform: scale(1.3); outline: 2px solid white; outline-offset: 2px; }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div id="card" class="rounded-2xl border border-white/10 w-80 overflow-hidden transition-colors duration-500" style="background:#1a1a1a">

    <div class="p-4">
      <img id="mainImg" src="https://picsum.photos/id/3/400/300"
        class="w-full h-52 object-cover rounded-xl">
    </div>

    <div class="flex gap-2 px-4 pb-4">
      <img onclick="changeImg(this, 'https://picsum.photos/id/3/400/300')"
        src="https://picsum.photos/id/3/400/300"
        class="thumb active w-16 h-16 object-cover rounded-lg cursor-pointer border-2 border-white">
      <img onclick="changeImg(this, 'https://picsum.photos/id/4/400/300')"
        src="https://picsum.photos/id/4/400/300"
        class="thumb w-16 h-16 object-cover rounded-lg cursor-pointer border-2 border-transparent">
      <img onclick="changeImg(this, 'https://picsum.photos/id/5/400/300')"
        src="https://picsum.photos/id/5/400/300"
        class="thumb w-16 h-16 object-cover rounded-lg cursor-pointer border-2 border-transparent">
      <img onclick="changeImg(this, 'https://picsum.photos/id/6/400/300')"
        src="https://picsum.photos/id/6/400/300"
        class="thumb w-16 h-16 object-cover rounded-lg cursor-pointer border-2 border-transparent">
    </div>

    <div class="px-4 pb-4 flex flex-col gap-4">

      <div>
        <h2 class="text-white text-lg font-bold">Wireless Headphones</h2>
        <p class="text-gray-400 text-sm mt-1">Premium sound quality with noise cancellation.</p>
      </div>

      <div class="flex flex-col gap-2">
        <p class="text-gray-400 text-xs uppercase tracking-widest">Color</p>
        <div class="flex gap-3">
          <button onclick="changeColor(this, '#1a1a1a')" class="color-dot active w-7 h-7 rounded-full cursor-pointer" style="background:#1a1a1a; border: 1px solid rgba(255,255,255,0.3)"></button>
          <button onclick="changeColor(this, '#1a2a3a')" class="color-dot w-7 h-7 rounded-full cursor-pointer" style="background:#1a2a3a"></button>
          <button onclick="changeColor(this, '#2a1a2a')" class="color-dot w-7 h-7 rounded-full cursor-pointer" style="background:#2a1a2a"></button>
          <button onclick="changeColor(this, '#1a2a1a')" class="color-dot w-7 h-7 rounded-full cursor-pointer" style="background:#1a2a1a"></button>
          <button onclick="changeColor(this, '#2a2a1a')" class="color-dot w-7 h-7 rounded-full cursor-pointer" style="background:#2a2a1a"></button>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3 bg-white/5 border border-white/10 rounded-xl px-3 py-2">
          <button onclick="changeQty(-1)" class="text-white text-lg w-6 h-6 flex items-center justify-center hover:text-gray-300">−</button>
          <span id="qty" class="text-white text-sm w-4 text-center">1</span>
          <button onclick="changeQty(1)"  class="text-white text-lg w-6 h-6 flex items-center justify-center hover:text-gray-300">+</button>
        </div>
        <p id="price" class="text-white text-xl font-bold">$99</p>
      </div>

      <button class="bg-white text-black font-medium py-3 rounded-xl hover:bg-gray-200 transition-all w-full">
        Add to Cart
      </button>

    </div>
  </div>

  <script>
    let qty = 1;
    const basePrice = 99;

    function changeImg(el, src) {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active', 'border-white'));
      el.classList.add('active');
    }

    function changeColor(el, color) {
      document.getElementById('card').style.background = color;
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      el.classList.add('active');
    }

    function changeQty(val) {
      qty = Math.max(1, qty + val);
      document.getElementById('qty').textContent = qty;
      document.getElementById('price').textContent = '$' + (basePrice * qty);
    }
  </script>

</body>
</html>
